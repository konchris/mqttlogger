[tool.ruff]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "companion-monitor"]
markers = [
    "integration: marks tests that require external services (MQTT broker, database) -- skip offline with -m 'not integration'",
]

[tool.coverage.run]
omit = ["companion-monitor/bootstrap_sensors.py", "tests/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
