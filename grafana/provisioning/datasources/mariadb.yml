apiVersion: 1

datasources:
  - name: mqttlogger
    type: mysql
    url: mariadb:3306
    user: ${GRAFANA_DB_USER}
    secureJsonData:
      password: ${GRAFANA_DB_PASSWORD}
    jsonData:
      database: ${MYSQL_DATABASE}
      maxOpenConns: 5
      maxIdleConns: 5
      connMaxLifetime: 14400
    isDefault: true
    editable: false
